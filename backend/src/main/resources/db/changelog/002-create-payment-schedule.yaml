databaseChangeLog:
  - changeSet:
      id: 002-create-payment-schedule
      author: siims
      changes:
        - createTable:
            tableName: payment_schedule_entry
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: loan_application_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: payment_number
                  type: integer
                  constraints:
                    nullable: false
              - column:
                  name: payment_date
                  type: date
                  constraints:
                    nullable: false
              - column:
                  name: principal
                  type: decimal(15,2)
                  constraints:
                    nullable: false
              - column:
                  name: interest
                  type: decimal(15,2)
                  constraints:
                    nullable: false
              - column:
                  name: total_payment
                  type: decimal(15,2)
                  constraints:
                    nullable: false
              - column:
                  name: remaining_balance
                  type: decimal(15,2)
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: payment_schedule_entry
            baseColumnNames: loan_application_id
            referencedTableName: loan_application
            referencedColumnNames: id
            constraintName: fk_payment_schedule_loan_application
            onDelete: CASCADE
